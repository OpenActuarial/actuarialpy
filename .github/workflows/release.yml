name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    uses: OpenActuarial/.github/.github/workflows/reusable-release-build.yml@v1

  # PyPI Trusted Publishing requires this job to live in THIS repository:
  # PyPI matches job_workflow_ref, which for a cross-repo reusable workflow
  # would point at OpenActuarial/.github and never match this project's
  # publisher. Keep this job here; keep everything else reusable.
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  github-release:
    needs: publish
    uses: OpenActuarial/.github/.github/workflows/reusable-github-release.yml@v1
    permissions:
      contents: write
